<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exploradores del Clima — 5º CEIP San Fernando</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F0E3;
  --card: #FFFDF7;
  --primary: #1B6B7B;
  --primary-dark: #124E5A;
  --accent: #E89020;
  --accent-light: #FFF0CC;
  --success: #2E7D32;
  --success-light: #E8F5E9;
  --danger: #C0392B;
  --danger-light: #FDEDEC;
  --terra: #C25B30;
  --terra-light: #FDEBD8;
  --text: #2C2C2C;
  --text-soft: #666;
  --border: #DDD3C0;
  --shadow: 0 4px 20px rgba(0,0,0,0.10);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 20%, rgba(27,107,123,0.06) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(232,144,32,0.06) 0%, transparent 50%);
  min-height: 100vh;
  color: var(--text);
}
h1,h2,h3 { font-family: 'Fredoka One', cursive; letter-spacing: 0.5px; }

/* LAYOUT */
#app { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; }

/* TOP BAR */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--primary); color: white; border-radius: var(--radius);
  padding: 10px 18px; margin-bottom: 20px; box-shadow: var(--shadow);
}
#topbar .title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; }
#topbar .meta { display: flex; gap: 14px; align-items: center; font-size: 0.85rem; }
.comodin-bar { display: flex; gap: 5px; }
.comodin-btn {
  background: var(--accent); border: none; border-radius: 50%;
  width: 32px; height: 32px; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.comodin-btn:hover { transform: scale(1.15); }
.comodin-btn.used { background: #666; cursor: not-allowed; opacity: 0.5; }
.comodin-btn.used:hover { transform: none; }

/* PROGRESS */
#progress-wrap { margin-bottom: 18px; }
.progress-label { font-size: 0.8rem; color: var(--text-soft); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar { background: var(--border); border-radius: 20px; height: 10px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; border-radius: 20px; transition: width 0.5s ease; }

/* CARDS */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 26px; margin-bottom: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  animation: slideUp 0.4s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

/* PHASE HEADER */
.phase-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; border-radius: var(--radius); padding: 22px 26px;
  margin-bottom: 18px; box-shadow: var(--shadow);
}
.phase-header .num { font-size: 0.85rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 1px; }
.phase-header h2 { font-size: 1.6rem; margin: 4px 0 6px; }
.phase-header p { font-size: 0.9rem; opacity: 0.9; line-height: 1.5; }

/* GUIDE */
.guide-box {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--accent-light); border-radius: 12px;
  padding: 16px; margin-bottom: 16px;
  border-left: 4px solid var(--accent);
}
.guide-avatar { font-size: 2.2rem; flex-shrink: 0; }
.guide-text { font-size: 0.92rem; line-height: 1.6; color: var(--text); }
.guide-text strong { color: var(--primary); }

/* CONTENT BOX */
.content-box {
  background: #F0F7F9; border-radius: 12px;
  padding: 18px; margin-bottom: 14px;
  border: 1px solid #C5DDE3;
}
.content-box h3 { color: var(--primary); margin-bottom: 10px; font-size: 1.05rem; }
.content-box ul { padding-left: 18px; }
.content-box li { margin-bottom: 6px; font-size: 0.9rem; line-height: 1.5; }
.content-box p { font-size: 0.9rem; line-height: 1.6; }

/* TABLE */
.climate-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 10px 0; }
.climate-table th { background: var(--primary); color: white; padding: 8px 10px; text-align: left; }
.climate-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.climate-table tr:nth-child(even) td { background: #F5F0E8; }

/* QUESTIONS */
.question-block { margin-bottom: 20px; }
.question-text { font-weight: 700; font-size: 1rem; color: var(--primary-dark); margin-bottom: 12px; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  background: white; border: 2px solid var(--border);
  border-radius: 10px; padding: 12px 16px; text-align: left;
  cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
  font-weight: 600; transition: all 0.2s; color: var(--text);
}
.option-btn:hover:not(:disabled) { border-color: var(--primary); background: #EEF7FA; transform: translateX(4px); }
.option-btn.correct { background: var(--success-light); border-color: var(--success); color: var(--success); }
.option-btn.wrong { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
.option-btn:disabled { cursor: default; }

.feedback-box {
  border-radius: 10px; padding: 12px 16px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5;
  animation: slideUp 0.3s ease;
}
.feedback-box.correct { background: var(--success-light); border: 1px solid var(--success); color: var(--success); }
.feedback-box.wrong { background: var(--danger-light); border: 1px solid var(--danger); color: var(--danger); }
.feedback-box.hint { background: var(--accent-light); border: 1px solid var(--accent); color: #7A4A00; }

/* HELP CARD */
.help-card {
  background: var(--terra-light); border: 2px solid var(--terra);
  border-radius: 12px; padding: 16px; margin: 10px 0;
  animation: slideUp 0.3s ease;
}
.help-card h4 { color: var(--terra); margin-bottom: 6px; font-family: 'Fredoka One', cursive; }
.help-card p { font-size: 0.88rem; line-height: 1.5; }

/* PAPER TASK */
.paper-task {
  background: #FFFDE7; border: 2px dashed #F9A825;
  border-radius: var(--radius); padding: 20px; margin: 16px 0;
}
.paper-task .paper-icon { font-size: 2rem; margin-bottom: 8px; }
.paper-task h3 { color: #E65100; font-size: 1.1rem; margin-bottom: 8px; }
.paper-task p { font-size: 0.9rem; line-height: 1.6; color: #5D4037; }
.paper-task .teacher-note {
  background: #FFF9C4; border-radius: 8px; padding: 10px 14px;
  margin-top: 12px; font-size: 0.85rem; color: #5D4037;
  border-left: 3px solid #F9A825;
}

/* VALIDATE BUTTON */
.validate-btn {
  background: linear-gradient(135deg, #E65100, #F57C00);
  color: white; border: none; border-radius: 10px;
  padding: 12px 22px; font-family: 'Fredoka One', cursive;
  font-size: 1rem; cursor: pointer; margin-top: 14px;
  box-shadow: 0 4px 12px rgba(230,81,0,0.3);
  transition: all 0.2s; width: 100%;
}
.validate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(230,81,0,0.4); }

/* FAQ */
.faq-section { margin-top: 14px; }
.faq-toggle {
  background: none; border: 2px solid var(--primary);
  border-radius: 10px; padding: 10px 16px; width: 100%;
  text-align: left; cursor: pointer; font-family: 'Nunito', sans-serif;
  font-weight: 700; color: var(--primary); font-size: 0.9rem;
  display: flex; justify-content: space-between; align-items: center;
  transition: all 0.2s;
}
.faq-toggle:hover { background: #EEF7FA; }
.faq-list { display: none; margin-top: 8px; }
.faq-list.open { display: block; }
.faq-item { border-bottom: 1px solid var(--border); padding: 10px 4px; }
.faq-q { font-weight: 700; font-size: 0.88rem; color: var(--primary-dark); cursor: pointer; display: flex; justify-content: space-between; }
.faq-a { font-size: 0.85rem; color: var(--text-soft); line-height: 1.5; margin-top: 6px; display: none; padding: 6px 0; }
.faq-a.open { display: block; }

/* WORD REVEAL */
.word-reveal {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; border-radius: var(--radius); padding: 24px;
  text-align: center; margin: 18px 0; animation: pulse 0.6s ease;
}
@keyframes pulse { 0%{transform:scale(0.95)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }
.word-reveal .word { font-family: 'Fredoka One', cursive; font-size: 2.8rem; letter-spacing: 4px; color: var(--accent); display: block; margin: 8px 0; }
.word-reveal p { font-size: 0.9rem; opacity: 0.9; }
.word-counter { font-size: 0.85rem; opacity: 0.75; margin-top: 6px; }
.notebook-reminder {
  background: #FFF9C4; border: 2px solid #F9A825;
  border-radius: 10px; padding: 12px 16px; text-align: center;
  font-size: 0.9rem; color: #5D4037; font-weight: 700; margin-top: 10px;
}

/* BUTTONS */
.btn {
  border: none; border-radius: 10px; padding: 13px 26px;
  font-family: 'Fredoka One', cursive; font-size: 1rem;
  cursor: pointer; transition: all 0.2s; display: inline-block;
}
.btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(27,107,123,0.3); }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 14px rgba(232,144,32,0.3); }
.btn-accent:hover { transform: translateY(-2px); }
.btn-success { background: var(--success); color: white; box-shadow: 0 4px 14px rgba(46,125,50,0.3); }
.btn-success:hover { transform: translateY(-2px); }
.btn-block { width: 100%; text-align: center; }

/* CELEBRATION */
.celebration {
  text-align: center; padding: 30px;
  background: linear-gradient(135deg, #E8F5E9, #F1F8E9);
  border-radius: var(--radius); border: 2px solid var(--success);
}
.celebration .trophy { font-size: 4rem; animation: bounce 0.8s ease; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.celebration h2 { color: var(--success); font-size: 1.8rem; margin: 10px 0 8px; }
.celebration p { color: #388E3C; font-size: 0.95rem; line-height: 1.6; }

/* DIPLOMA */
.diploma {
  background: linear-gradient(135deg, #FFFDE7, #FFF8E1);
  border: 4px solid var(--accent); border-radius: var(--radius);
  padding: 32px; text-align: center; margin: 18px 0;
  box-shadow: 0 6px 24px rgba(232,144,32,0.2);
}
.diploma .deco { font-size: 1.5rem; letter-spacing: 6px; color: var(--accent); }
.diploma h2 { font-size: 1.6rem; color: var(--primary-dark); margin: 12px 0 6px; }
.diploma .recipient { font-size: 1.2rem; color: var(--terra); font-weight: 800; margin: 10px 0; }
.diploma p { font-size: 0.88rem; color: var(--text-soft); line-height: 1.6; }
.diploma .school { font-weight: 700; color: var(--primary); font-size: 0.95rem; }
.diploma .date { font-size: 0.82rem; color: var(--text-soft); margin-top: 12px; }
.diploma-divider { border: none; border-top: 1px dashed var(--accent); margin: 14px 0; }
#diploma-name-input {
  border: 2px solid var(--border); border-radius: 8px;
  padding: 10px 16px; font-family: 'Nunito', sans-serif;
  font-size: 1rem; width: 100%; max-width: 340px;
  margin: 10px auto; display: block; text-align: center;
}
#diploma-name-input:focus { outline: none; border-color: var(--primary); }

/* PHRASE COLLECTOR */
.phrase-collector {
  background: var(--primary-dark); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 14px; text-align: center;
}
.phrase-collector .label { font-size: 0.78rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.phrase-slots { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.phrase-slot {
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px; padding: 6px 12px; min-width: 70px;
  font-family: 'Fredoka One', cursive; font-size: 1rem;
  color: rgba(255,255,255,0.3); text-align: center; transition: all 0.4s;
}
.phrase-slot.revealed { color: var(--accent); border-color: var(--accent); background: rgba(232,144,32,0.15); }

/* COMODIN MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-box {
  background: white; border-radius: var(--radius);
  padding: 28px; max-width: 480px; width: 90%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  animation: slideUp 0.3s ease;
}
.modal-box h3 { color: var(--primary); margin-bottom: 12px; font-size: 1.3rem; }
.modal-box p { font-size: 0.9rem; line-height: 1.6; color: var(--text); }
.modal-close {
  background: var(--primary); color: white; border: none;
  border-radius: 8px; padding: 10px 20px;
  font-family: 'Fredoka One', cursive; font-size: 0.95rem;
  cursor: pointer; margin-top: 16px; width: 100%;
}

/* STARS */
.stars { font-size: 1.3rem; letter-spacing: 2px; }

/* FOOTER */
.footer-credit {
  text-align: center; font-size: 0.72rem; color: var(--text-soft);
  margin-top: 40px; padding-top: 16px;
  border-top: 1px solid var(--border); line-height: 1.8;
}

/* SCREEN: WELCOME */
.welcome-screen { text-align: center; padding: 20px 0; }
.welcome-screen .big-icon { font-size: 5rem; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.welcome-screen h1 { font-size: 2rem; color: var(--primary); margin: 14px 0 8px; }
.welcome-screen .subtitle { font-size: 1rem; color: var(--text-soft); margin-bottom: 24px; line-height: 1.6; }
.welcome-screen .school-badge {
  display: inline-block; background: var(--primary); color: white;
  border-radius: 20px; padding: 6px 18px; font-size: 0.85rem;
  font-weight: 700; margin-bottom: 20px;
}

/* UTILS */
.mt-10 { margin-top: 10px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }
.text-center { text-align: center; }
.hidden { display: none !important; }
.emoji-big { font-size: 1.5rem; }
@media print { #topbar, #progress-wrap, #phrase-bar, .faq-section, .btn, .validate-btn, .guide-box, .comodin-bar, .footer-credit { display:none !important; } body { background: white; } .diploma { border: 3px solid #E89020; box-shadow: none; } }

/* TTS HIGHLIGHTING */
.tts-bar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  background:#E8F5E9; border:2px solid var(--success);
  border-radius:10px; padding:10px 14px; margin-bottom:12px;
}
.tts-btn {
  background:var(--success); color:white; border:none;
  border-radius:8px; padding:8px 16px; cursor:pointer;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem;
  display:flex; align-items:center; gap:6px; transition:all 0.2s;
}
.tts-btn:hover { background:var(--success-dark,#1B5E20); }
.tts-btn.stop { background:#C62828; }
.tts-info { font-size:0.82rem; color:#2E7D32; }
.word-highlight { transition: background 0.1s; border-radius:3px; padding:1px 2px; }
.word-highlight.speaking { background:#FFF176; color:#000; font-weight:700; }
.tts-permission-box {
  background:#FFF8E1; border:2px solid var(--accent);
  border-radius:12px; padding:18px; text-align:center; margin-bottom:14px;
}
.tts-permission-box h4 { color:var(--accent); font-family:'Fredoka One',cursive; margin-bottom:8px; }
.tts-permission-box p { font-size:0.88rem; color:var(--text-soft); margin-bottom:14px; }
.tts-perm-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.tts-perm-teacher { background:var(--primary); color:white; border:none; border-radius:8px; padding:10px 18px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem; }
.tts-perm-deny { background:#999; color:white; border:none; border-radius:8px; padding:10px 18px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar" class="hidden">
    <span class="title">🌍 Exploradores del Clima</span>
    <div class="meta">
      <span id="phase-label">Fase 1/5</span>
      <div class="comodin-bar" id="comodin-bar"></div>
    </div>
  </div>
  <div id="progress-wrap" class="hidden">
    <div class="progress-label"><span id="progress-text">Progreso</span><span id="progress-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="phrase-bar" class="hidden">
    <div class="phrase-collector">
      <div class="label">🔑 Tu frase secreta</div>
      <div class="phrase-slots" id="phrase-slots"></div>
    </div>
  </div>
  <div id="main-content"></div>
  <div class="footer-credit">
    Elaborado por <strong>Luis Gómez y Elisa Sánchez</strong> · Podcast <em>IA y Educación</em> · CEIP San Fernando, Fuente del Rey, Dos Hermanas · 5º de Primaria<br>
    Generado con asistencia de Claude (Anthropic) · Uso educativo no comercial
  </div>
</div>
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 id="modal-title">🧭 Pista</h3>
    <p id="modal-body"></p>
    <button class="modal-close" onclick="closeModal()">Entendido ✓</button>
  </div>
</div>
<script>
// ============================================================
// GAME DATA
// ============================================================
const PHRASES = ['EL','CLIMA','MOLDEA','NUESTRA','TIERRA'];

const FAQS = [
  // Phase 1
  [
    {q:'¿En qué se diferencia el tiempo del clima?', a:'El tiempo es lo que pasa hoy en el cielo (sol, lluvia, frío...). El clima es cómo suele ser ese lugar durante muchos años.'},
    {q:'¿Por qué cambia el tiempo tan rápido?', a:'El tiempo cambia porque el aire se mueve, la temperatura sube o baja y la humedad varía. El clima, en cambio, es mucho más estable.'},
    {q:'¿Cuántos elementos tiene el tiempo?', a:'Cinco: temperatura, precipitación, humedad, presión atmosférica y viento.'},
    {q:'¿Puedo buscar más información en mi libro?', a:'¡Claro! Consulta el tema de Conocimiento del Medio en tu libro. Busca las páginas sobre meteorología y climatología.'},
  ],
  // Phase 2
  [
    {q:'¿Para qué sirve el pluviómetro?', a:'Para medir cuánta lluvia cae en un metro cuadrado. Se mide en litros por metro cuadrado (l/m²).'},
    {q:'¿Qué diferencia hay entre la veleta y el anemómetro?', a:'La veleta indica de dónde viene el viento (norte, sur, este, oeste). El anemómetro mide a qué velocidad va.'},
    {q:'¿Qué factores hacen que un lugar tenga más frío o más calor?', a:'La latitud (qué tan cerca del Ecuador está), la altitud (la altura), la distancia al mar y el relieve (montañas y valles).'},
    {q:'¿Puedo consultar mi cuaderno para repasar los instrumentos?', a:'Sí, mira tus apuntes o el libro. Busca los nombres y funciones de cada instrumento meteorológico.'},
  ],
  // Phase 3
  [
    {q:'¿Qué es el clima atlántico?', a:'Es el clima de las zonas cercanas al océano. Tiene temperaturas suaves todo el año y lluvias frecuentes en todas las estaciones.'},
    {q:'¿Por qué el mar suaviza las temperaturas?', a:'El agua del mar tarda mucho en calentarse y en enfriarse. Por eso en verano refresca y en invierno da calor. Se llama inercia térmica.'},
    {q:'¿Dónde hay clima atlántico en España?', a:'En el norte y noroeste: Galicia, Asturias, Cantabria y el País Vasco.'},
    {q:'¿Dónde busco más info sobre el clima atlántico?', a:'En tu libro de Conocimiento del Medio, en el apartado de los tipos de clima. También puedes mirar los mapas climáticos.'},
  ],
  // Phase 4
  [
    {q:'¿Cuál es la diferencia entre el clima mediterráneo y el continental?', a:'El mediterráneo tiene veranos secos y calurosos con inviernos suaves. El continental tiene temperaturas extremas: inviernos muy fríos y veranos muy calurosos.'},
    {q:'¿Por qué el clima mediterráneo tiene poca lluvia en verano?', a:'Porque en verano las masas de aire cálido y seco dominan la región. Las lluvias se concentran en otoño e invierno.'},
    {q:'¿Qué es la amplitud térmica?', a:'Es la diferencia entre la temperatura más alta y la más baja del año. En el clima continental puede ser de más de 30 grados.'},
    {q:'¿Puedo repasar los tres climas en mi libro?', a:'Sí. Busca la tabla comparativa de los climas templados. Repasa temperaturas, precipitaciones y vegetación de cada uno.'},
  ],
  // Phase 5
  [

// UTILITY

function $(id){ return document.getElementById(id); }
function html(id,content){ $(id).innerHTML = content; }

function showModal(title, body){
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = body;
  $('modal-overlay').classList.remove('hidden');
}
function closeModal(){
  $('modal-overlay').classList.add('hidden');
}

function updateTopBar(){
  if(state.screen === 'welcome'){ 
    $('topbar').classList.add('hidden');
    $('progress-wrap').classList.add('hidden');
    $('phrase-bar').classList.add('hidden');
    return;
  }
  $('topbar').classList.remove('hidden');
  $('progress-wrap').classList.remove('hidden');
  $('phrase-bar').classList.remove('hidden');
  $('phase-label').textContent = `Fase ${state.phase+1}/5`;
  // comodines
  let bar = '';
  for(let i=0;i<5;i++){
    const used = i >= state.comodines;
    bar += `<button class="comodin-btn${used?' used':''}" onclick="useComodin()" title="Pista (${state.comodines} restantes)">🧭</button>`;
  }
  $('comodin-bar').innerHTML = bar;
  // phrase slots
  const words = ['EL','CLIMA','MOLDEA','NUESTRA','TIERRA'];
  let slots = '';
  for(let i=0;i<5;i++){
    const revealed = state.wordsFound.includes(i);
    slots += `<div class="phrase-slot${revealed?' revealed':''}">${revealed ? words[i] : '?'}</div>`;
  }
  $('phrase-slots').innerHTML = slots;
  // progress
  const totalSteps = 5 * 3; // 5 phases * 3 steps
  const done = state.phase * 3 + (state.step==='intro'?0 : state.step==='question'?1 : state.step==='paper'?2 : 3);
  const pct = Math.round(done/totalSteps*100);
  $('progress-fill').style.width = pct+'%';
  $('progress-text').textContent = `Fase ${state.phase+1}: ${['Repaso','Preguntas','Prueba en papel','¡Completada!'][['intro','question','paper','celebrate'].indexOf(state.step)]}`;
  $('progress-pct').textContent = pct+'%';
}

function useComodin(){
  if(state.comodines <= 0){ showModal('😔 Sin pistas','Ya has usado todas tus pistas. ¡Confía en lo que has aprendido y consulta tu libro o cuaderno!'); return; }
  if(state.screen !== 'phase' || state.step !== 'question'){ 
    showModal('🧭 Pista','Las pistas solo se pueden usar cuando estás respondiendo una pregunta. ¡Llega hasta las preguntas y úsala allí!'); return; 
  }
  const q = PHASE_QUESTIONS[state.phase][state.qIndex];
  state.comodines--;
  updateTopBar();
  showModal('🧭 Pista — Comodín usado',`<strong>${q.helpCard}</strong><br><br><em>💡 También puedes consultar tu libro de texto o tu cuaderno para encontrar la respuesta.</em><br><br>Te quedan <strong>${state.comodines}</strong> pistas.`);
}

function renderFAQ(phaseIdx){
  const items = FAQS[phaseIdx];
  let html = `<div class="faq-section">
    <button class="faq-toggle" onclick="toggleFAQ(this)">❓ Preguntas frecuentes <span>▼</span></button>
    <div class="faq-list" id="faq-list">`;
  items.forEach((item,i)=>{
    html += `<div class="faq-item">
      <div class="faq-q" onclick="toggleFAQItem(${i})">📌 ${item.q} <span id="faq-arrow-${i}">▸</span></div>
      <div class="faq-a" id="faq-a-${i}">${item.a}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}
function toggleFAQ(btn){
  const list = $('faq-list');
  list.classList.toggle('open');
  btn.querySelector('span').textContent = list.classList.contains('open') ? '▲' : '▼';
}
function toggleFAQItem(i){
  const a = $('faq-a-'+i);
  const arr = $('faq-arrow-'+i);
  a.classList.toggle('open');
  arr.textContent = a.classList.contains('open') ? '▾' : '▸';
}

  const titles = ['¿Tiempo o clima?','Los factores del clima','El clima atlántico','Los climas mediterráneo y continental','El clima y la vida'];
  const subtitles = [
    'Descubre la diferencia entre tiempo y clima, y conoce los instrumentos de los meteorólogos.',
    'Averigua por qué no hace el mismo tiempo en todos los rincones del planeta.',
    'Explora las tierras verdes del norte bañadas por el Atlántico.',
    'Del sol abrasador al frío polar extremo: dos climas muy distintos.',
    'Cómo los seres vivos se adaptan a cada tipo de clima.'
  ];
  html('main-content',`
    <div class="phase-header">
      <div class="num">🗺️ Fase ${state.phase+1} de 5</div>
      <h2>${titles[state.phase]}</h2>
      <p>${subtitles[state.phase]}</p>
    </div>
    <div class="guide-box">
      <div class="guide-avatar">🧭</div>
      <div class="guide-text">${GUIDE_MESSAGES[state.phase]}</div>
    </div>
    <div class="card">
      <div class="tts-permission-box" id="tts-perm-box-${state.phase}" style="display:none">
        <h4>🔊 Lectura en voz alta</h4>
        <p>El alumno/a quiere escuchar el texto. El texto se iluminará palabra por palabra para facilitar la lectura.</p>
        <div class="tts-perm-btns">
          <button class="tts-perm-teacher" onclick="ttsTeacherAllow(${state.phase})">✅ Profe: Permitir audio</button>
          <button class="tts-perm-deny" onclick="ttsTeacherDeny(${state.phase})">❌ Profe: Sin audio</button>
        </div>
      </div>
      <div class="tts-bar" id="tts-bar-${state.phase}" style="display:${ttsState.permitted===true?'flex':'none'}">
        <button class="tts-btn" id="tts-play-btn-${state.phase}" onclick="ttsTrigger(${state.phase})">🔊 Escuchar texto</button>
        <span class="tts-info">📖 Las palabras se iluminarán mientras se lee el texto</span>
      </div>
      <div style="text-align:right;margin-bottom:8px">
        <button onclick="ttsRequestPermission(${state.phase})" style="background:none;border:2px solid var(--success);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;color:var(--success)">🔊 Pedir permiso para escuchar</button>
      </div>
      <div id="tts-text-target-${state.phase}">${INTRO_CONTENT[state.phase]}</div>
      ${renderFAQ(state.phase)}
      <div class="mt-20 text-center">
        <button class="btn btn-primary" onclick="startQuestions()">📝 ¡A responder preguntas! →</button>
      </div>
    </div>
  `);
}

function startQuestions(){
  state.step='question'; state.qIndex=0; state.questionsAnswered=0;
  state.score=0; state.consecutiveFails=0; state.answered=false;
  renderQuestion();
}

function renderQuestion(){
  updateTopBar();
  const q = PHASE_QUESTIONS[state.phase][state.qIndex];
  const total = PHASE_QUESTIONS[state.phase].length;
  const showHelp = state.consecutiveFails >= 2;
  html('main-content',`
    <div class="phase-header" style="padding:16px 22px">
      <div class="num">🗺️ Fase ${state.phase+1} · Pregunta ${state.qIndex+1} de ${total}</div>
      <h2 style="font-size:1.2rem">Demuestra lo que sabes</h2>
    </div>
    ${showHelp ? `<div class="help-card"><h4>📖 Repaso rápido</h4><p>${q.helpCard}<br><br>💡 También puedes mirar tu libro o cuaderno antes de responder.</p></div>` : ''}
    <div class="card">
      <div class="question-block">
        <div class="question-text">❓ ${q.text}</div>
        <div class="options" id="options-container">
          ${q.options.map((o,i)=>`<button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">${o.text}</button>`).join('')}
        </div>
        <div id="feedback-area"></div>
      </div>
      ${renderFAQ(state.phase)}
      <div class="mt-16" style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;color:var(--text-soft)">
        <span>🧭 Pistas: ${state.comodines}/5</span>
        <span>💡 Recuerda: puedes consultar tu libro y cuaderno</span>
      </div>
    </div>
  `);
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered = true;
  const q = PHASE_QUESTIONS[state.phase][state.qIndex];
  const correct = q.options[idx].correct;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(q.options[i].correct) b.classList.add('correct');
    else if(i===idx && !correct) b.classList.add('wrong');
  });
  const fb = $('feedback-area');
  if(correct){
    state.consecutiveFails=0; state.score++;
    fb.innerHTML=`<div class="feedback-box correct">✅ ${q.explanation}</div>`;
  } else {
    state.consecutiveFails++;
    fb.innerHTML=`<div class="feedback-box wrong">❌ No era esa. ${q.explanation}</div>`;
  }
  state.questionsAnswered++;
  // Add continue button
  const continueBtn = document.createElement('div');
  continueBtn.style.cssText = 'text-align:center;margin-top:14px';
  continueBtn.innerHTML = '<button class="btn btn-primary" onclick="nextQuestion()" style="font-size:1rem;padding:12px 28px">¡Seguimos! →</button>';
  document.querySelector('.question-block').appendChild(continueBtn);
}

function nextQuestion(){
  const total = PHASE_QUESTIONS[state.phase].length;
  if(state.qIndex < total-1){
    state.qIndex++; state.answered=false;
    renderQuestion();
  } else {
    // Check if failed 2 or more questions
    const wrong = total - state.score;
    if(wrong >= 2){
      renderRepeat(wrong, total);
    } else {
      renderPaperTask();
    }
  }
}

function renderRepeat(wrong, total){
  updateTopBar();
  html('main-content',`
    <div class="phase-header" style="background:linear-gradient(135deg,#7B1FA2,#9C27B0)">
      <div class="num">🔄 Fase ${state.phase+1} · Repaso necesario</div>
      <h2 style="font-size:1.3rem">¡Vamos a repasar un poco más!</h2>
      <p>Has fallado ${wrong} de ${total} preguntas. ¡Sin problema! Repasa el contenido y vuelve a intentarlo.</p>
    </div>
    <div class="guide-box">
      <div class="guide-avatar">🧭</div>
      <div class="guide-text">¡No te preocupes! Los exploradores de verdad repasan y aprenden de sus errores. Te recomiendo que <strong>leas de nuevo la información de esta fase</strong> y consultes tu libro o cuaderno antes de intentarlo otra vez.</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:3rem;margin-bottom:12px">📚</div>

      <p style="font-size:0.92rem;line-height:1.6;color:var(--text-soft);margin-bottom:20px">
        1. Lee de nuevo la información de esta fase con atención.<br>
        2. Consulta tu libro de texto y tus apuntes.<br>
        3. Si tienes dudas, usa una pista o pregunta a tu profe.<br>
        4. Cuando te sientas preparado/a, vuelve a intentar las preguntas.
      </p>
      <button class="btn btn-primary" onclick="retryPhase()" style="font-size:1rem;padding:13px 28px">🔄 Repasar y volver a intentarlo</button>
    </div>
  `);
}

function retryPhase(){
  state.step='intro'; state.qIndex=0; state.score=0;
  state.answered=false; state.consecutiveFails=0;
  renderPhaseIntro();
}

function renderPaperTask(){
  state.step='paper'; state.paperValidated=false;
  updateTopBar();
  const task = PAPER_TASKS[state.phase];
  const correct = state.score;
  const total = PHASE_QUESTIONS[state.phase].length;
  html('main-content',`
    <div class="phase-header" style="background:linear-gradient(135deg,#E65100,#F57C00)">
      <div class="num">📝 Fase ${state.phase+1} · Tarea en papel</div>
      <h2 style="font-size:1.3rem">¡Ahora a trabajar en el cuaderno!</h2>
      <p>Has respondido ${correct} de ${total} preguntas correctamente. ¡Sigue así!</p>
    </div>
    <div class="guide-box">
      <div class="guide-avatar">🧭</div>
      <div class="guide-text">Esta parte no se hace en la tablet. Coge tu cuaderno, tu libro y tu lápiz. <strong>Tu profe te explicará la tarea</strong> y cuando la hayas hecho bien, te dará el OK para continuar.</div>
    </div>
    <div class="paper-task">
      <div class="paper-icon">📄</div>
      <h3>${task.title}</h3>
      <p>${task.task}</p>
      <div class="teacher-note">${task.teacherNote}</div>
    </div>
    ${renderFAQ(state.phase)}
    <div style="text-align:center;margin-top:20px">
      <p style="font-size:0.88rem;color:var(--text-soft);margin-bottom:12px">⏳ Espera a que tu profe revise tu trabajo y pulse el botón</p>
      <button class="validate-btn" onclick="teacherValidate()">
        ✅ El/la profe valida: ¡Tarea superada!
      </button>
    </div>
  `);
}

function teacherValidate(){
  state.paperValidated=true;
  renderCelebration();
}

function renderCelebration(){
  state.step='celebrate';
  updateTopBar();
  const [trophy, title, msg] = CELEBRATIONS[state.phase];
  const word = PHRASES[state.phase];
  if(!state.wordsFound.includes(state.phase)) state.wordsFound.push(state.phase);
  updateTopBar();
  html('main-content',`
    <div class="card celebration">
      <div class="trophy">${trophy}</div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <div class="stars">⭐⭐⭐</div>
    </div>
    <div class="word-reveal">
      <p>🔑 La palabra secreta de esta fase es:</p>
      <span class="word">${word}</span>
      <div class="word-counter">Has encontrado ${state.wordsFound.length} de 5 palabras</div>
    </div>
    <div class="notebook-reminder">
      ✏️ ¡Apunta la palabra <strong>${word}</strong> en tu cuaderno ahora mismo!<br>
      La necesitarás al final del juego para descubrir la frase secreta.<br>
      Llevas: ${state.wordsFound.map(i=>PHRASES[i]).join(' · ')}
    </div>
    <div class="mt-20 text-center">
      ${state.phase < 4 
        ? `<button class="btn btn-primary" onclick="nextPhase()">🗺️ Siguiente fase →</button>`
        : `<button class="btn btn-success" onclick="renderFinal()" style="font-size:1.1rem;padding:16px 30px">🏆 ¡Ver frase final y diploma!</button>`
      }
    </div>
  `);
}

function nextPhase(){
  state.phase++; state.step='intro'; state.qIndex=0;
  state.answered=false; state.consecutiveFails=0;
  renderPhaseIntro();
}

function renderFinal(){
  state.screen='final'; updateTopBar();
  const phrase = PHRASES.join(' ');
  html('main-content',`
    <div class="card celebration">
      <div class="trophy">🏆</div>
      <h2>¡Eres un/a EXPLORADOR/A del Clima!</h2>
      <p>Has completado las 5 fases y dominás los climas del mundo.<br>
      ¡El CEIP San Fernando tiene un/a nuevo/a experto/a!</p>
    </div>
    <div class="word-reveal" style="margin-bottom:0">
      <p>🔑 La frase secreta completa es:</p>

// ============================================================
// TTS (TEXT TO SPEECH) WITH WORD HIGHLIGHTING
// ============================================================
let ttsState = { active:false, utterance:null, permitted:null, words:[], spans:[], timer:null };

const PHASE_TTS_TEXT = [
  "Bienvenido a la fase uno. En esta fase aprenderás la diferencia entre el tiempo atmosférico y el clima. El tiempo atmosférico es el estado del cielo en un momento concreto: si hoy llueve, hace sol o hay viento. El clima, en cambio, describe cómo suele ser ese lugar durante muchos años. También conocerás los instrumentos que usan los meteorólogos: el termómetro mide la temperatura, el pluviómetro mide la lluvia, la veleta indica la dirección del viento, el anemómetro mide la velocidad del viento y el barómetro mide la presión atmosférica.",
  "Bienvenido a la fase dos. Aquí descubrirás por qué no hace el mismo clima en todas partes del mundo. El clima depende de cuatro factores: la latitud, que es la distancia al Ecuador; la influencia del mar, que suaviza las temperaturas; el relieve, es decir, las montañas y valles que bloquean las nubes; y la altitud, porque a mayor altura hace más frío. Por ejemplo, en Sevilla hace mucho calor en verano porque está lejos del mar y en una latitud cálida.",
  "Bienvenido a la fase tres. Vamos a explorar el clima atlántico u oceánico. Este clima aparece en las zonas cercanas al Atlántico: Galicia, el norte de España, Irlanda y el Reino Unido. Las temperaturas son suaves todo el año y llueve constantemente, más de mil milímetros al año. La vegetación son bosques de robles y hayas, y los prados están siempre verdes. El mar actúa como un aire acondicionado natural: refresca en verano y calienta en invierno. A esto lo llamamos inercia térmica.",
  "Bienvenido a la fase cuatro. En esta fase compararás dos climas muy distintos. El clima mediterráneo tiene veranos secos y calurosos y lluvias concentradas en otoño e invierno. La vegetación típica son pinos, olivos, romero y tomillo. El clima continental, en cambio, tiene temperaturas extremas: inviernos muy fríos bajo cero grados y veranos muy calurosos por encima de treinta grados. La diferencia entre el máximo y el mínimo del año se llama amplitud térmica y en el clima continental es enorme.",
  "Bienvenido a la fase cinco. En esta última fase estudiarás cómo los seres vivos se han adaptado a cada tipo de clima. En el clima mediterráneo, plantas como el romero y el tomillo detienen su crecimiento en verano para sobrevivir a la sequía. En el clima continental, animales como el alce tienen pelajes muy gruesos y otros hibernan durante los meses más fríos. En el clima atlántico, los bosques tienen hojas grandes para aprovechar la abundante lluvia y la luz solar."
];

function ttsRequestPermission(phaseIdx) {
  if(ttsState.permitted === true) { ttsStart(phaseIdx); return; }
  if(ttsState.permitted === false) { return; }
  // Show permission UI
  const permBox = document.getElementById('tts-perm-box-'+phaseIdx);
  if(permBox) permBox.style.display='block';
}

function ttsTeacherAllow(phaseIdx){
  ttsState.permitted = true;
  const permBox = document.getElementById('tts-perm-box-'+phaseIdx);
  if(permBox) permBox.style.display='none';
  const bar = document.getElementById('tts-bar-'+phaseIdx);
  if(bar) bar.style.display='flex';
  ttsStart(phaseIdx);
}

function ttsTeacherDeny(phaseIdx){
  ttsState.permitted = false;
  const permBox = document.getElementById('tts-perm-box-'+phaseIdx);
  if(permBox) permBox.style.display='none';
  showModal('🔇 Sin audio','Continuarás leyendo el texto sin audio. ¡Puedes hacerlo! Lee con calma, párrafo por párrafo.');
}

function ttsStart(phaseIdx){
  if(!('speechSynthesis' in window)){ showModal('⚠️','Lo siento, este navegador no admite lectura en voz alta. Prueba con Chrome.'); return; }
  ttsStop();
  const text = PHASE_TTS_TEXT[phaseIdx];
  // Highlight words in content area
  ttsHighlightSetup(text, phaseIdx);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.05;
  ttsState.utterance = u; ttsState.active = true;
  let wordIdx = 0;
  u.onboundary = (e) => {
    if(e.name === 'word'){
      ttsState.spans.forEach(s=>s.classList.remove('speaking'));
      if(ttsState.spans[wordIdx]) ttsState.spans[wordIdx].classList.add('speaking');
      wordIdx++;
    }
  };
  u.onend = () => { ttsState.active=false; ttsState.spans.forEach(s=>s.classList.remove('speaking')); updateTTSButton(phaseIdx,false); };
  u.onerror = () => { ttsState.active=false; updateTTSButton(phaseIdx,false); };
  window.speechSynthesis.speak(u);
  updateTTSButton(phaseIdx,true);
}

function ttsHighlightSetup(text, phaseIdx){
  // Wrap each word in the tts-text-target span
  const target = document.getElementById('tts-text-target-'+phaseIdx);
  if(!target) return;
  const words = text.split(/(\s+)/);
  let spansHTML = '';
  let spanIdx = 0;
  words.forEach(part => {
    if(/\S/.test(part)){
      spansHTML += `<span class="word-highlight" id="tts-w-${phaseIdx}-${spanIdx++}">${part}</span>`;
    } else {
      spansHTML += part;
    }
  });
  target.innerHTML = spansHTML;
  ttsState.spans = Array.from(target.querySelectorAll('.word-highlight'));
}

function ttsStop(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  ttsState.active=false; ttsState.utterance=null;
  ttsState.spans.forEach(s=>s.classList.remove('speaking'));
}

function ttsTrigger(phaseIdx){
  if(ttsState.active){ ttsStop(); updateTTSButton(phaseIdx,false); }
  else { ttsStart(phaseIdx); }
}

function updateTTSButton(phaseIdx, playing){
  const btn = document.getElementById('tts-play-btn-'+phaseIdx);
  if(btn) btn.innerHTML = playing ? '⏹ Detener lectura' : '🔊 Escuchar texto';
  if(btn) btn.className = 'tts-btn' + (playing?' stop':'');
}

renderWelcome();
